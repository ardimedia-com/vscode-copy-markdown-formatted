name: Publish to Marketplace

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Package VSIX
        run: npx vsce package

      - name: Find VSIX
        id: vsix
        run: |
          VSIX_PATH=$(ls *.vsix | head -1)
          echo "path=$VSIX_PATH" >> "$GITHUB_OUTPUT"
          echo "Found VSIX: $VSIX_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath ${{ steps.vsix.outputs.path }} --pat $VSCE_PAT
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
