name: Publish to Marketplace

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Capture the lines between "## [VERSION]" and the next "## " header.
          # index()==1 matches the literal header prefix (no regex metachars).
          awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q "[^[:space:]]" release-notes.md; then
            echo "::error::CHANGELOG.md has no entry for version $VERSION (expected a '## [$VERSION]' section)"
            exit 1
          fi
          echo "----- release notes for $VERSION -----"
          cat release-notes.md

      - name: Package VSIX
        run: npx vsce package

      - name: Find VSIX
        id: vsix
        run: |
          VSIX_PATH=$(ls *.vsix | head -1)
          echo "path=$VSIX_PATH" >> "$GITHUB_OUTPUT"
          echo "Found VSIX: $VSIX_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.vsix.outputs.path }}
          body_path: release-notes.md

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath ${{ steps.vsix.outputs.path }} --pat $VSCE_PAT
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
