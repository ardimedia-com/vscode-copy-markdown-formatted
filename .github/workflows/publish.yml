name: Publish to Marketplace

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check if version is new
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: v$VERSION"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package VSIX
        if: steps.check.outputs.skip == 'false'
        run: npx vsce package

      - name: Find VSIX
        if: steps.check.outputs.skip == 'false'
        id: vsix
        run: |
          VSIX_PATH=$(ls *.vsix | head -1)
          echo "path=$VSIX_PATH" >> "$GITHUB_OUTPUT"
          echo "Found VSIX: $VSIX_PATH"

      - name: Create git tag
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.check.outputs.version }}"
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: steps.check.outputs.skip == 'false'
        run: npx vsce publish --packagePath ${{ steps.vsix.outputs.path }} --pat $VSCE_PAT
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
